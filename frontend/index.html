<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบันทึกข้อมูลเครื่องคอมพิวเตอร์ประจำห้อง</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen p-5">
  <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
    
    <div class="bg-blue-600 text-white p-4 rounded-md mb-6 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">ระบบบันทึกข้อมูลเครื่องคอมพิวเตอร์ประจำห้อง (compuroom)</h1>
        <p class="text-sm mt-1">ผู้พัฒนา: นายพลวัต ศรีสุทร | รหัสนักศึกษา: 68319010026</p>
      </div>
      <span class="bg-white text-blue-600 px-3 py-1 rounded-full font-bold text-xs">โจทย์ชุดที่ 1</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-gray-50 p-4 rounded-md border border-gray-200">
        <h2 id="form-title" class="text-lg font-bold mb-4 text-gray-700">เพิ่มข้อมูลคอมพิวเตอร์</h2>
        <form id="compu-form" class="space-y-3">
          <input type="hidden" id="item-id">
          <div>
            <label class="block text-xs font-semibold text-gray-600">รหัสครุภัณฑ์ (asset_code)</label>
            <input type="text" id="asset_code" class="w-full p-2 border rounded mt-1 text-sm" required placeholder="เช่น COM-001">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600">ยี่ห้อและรุ่น (brand_model)</label>
            <input type="text" id="brand_model" class="w-full p-2 border rounded mt-1 text-sm" required placeholder="เช่น Dell OptiPlex 3090">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600">สเปก CPU (cpu)</label>
            <input type="text" id="cpu" class="w-full p-2 border rounded mt-1 text-sm" required placeholder="เช่น Intel Core i5">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600">ขนาด RAM (ram_gb)</label>
            <input type="number" id="ram_gb" class="w-full p-2 border rounded mt-1 text-sm" required placeholder="เช่น 16">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600">ห้องที่ติดตั้ง (room)</label>
            <input type="text" id="room" class="w-full p-2 border rounded mt-1 text-sm" required placeholder="เช่น 431">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600">สถานะ (status)</label>
            <select id="status" class="w-full p-2 border rounded mt-1 text-sm bg-white">
              <option value="ใช้งาน">ใช้งาน</option>
              <option value="ส่งซ่อม">ส่งซ่อม</option>
              <option value="จำหน่าย">จำหน่าย</option>
            </select>
          </div>
          <div class="pt-2 flex gap-2">
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-semibold hover:bg-green-700 w-full cursor-pointer">บันทึกข้อมูล</button>
            <button type="button" id="cancel-btn" class="hidden bg-gray-400 text-white px-4 py-2 rounded text-sm font-semibold hover:bg-gray-500 w-full cursor-pointer">ยกเลิก</button>
          </div>
        </form>
      </div>

      <div class="md:col-span-2">
        <h2 class="text-lg font-bold mb-4 text-gray-700">รายการคอมพิวเตอร์ทั้งหมด</h2>
        <div class="overflow-x-auto">
          <table class="w-full bg-white border border-gray-200 rounded-md text-sm">
            <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
              <tr>
                <th class="p-3 text-left">รหัสครุภัณฑ์</th>
                <th class="p-3 text-left">ยี่ห้อ/รุ่น</th>
                <th class="p-3 text-left">CPU/RAM</th>
                <th class="p-3 text-left">ห้อง</th>
                <th class="p-3 text-left">สถานะ</th>
                <th class="p-3 text-center">จัดการ</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-gray-200">
              </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
